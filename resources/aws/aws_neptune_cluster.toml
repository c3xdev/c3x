kind         = "aws_neptune_cluster"
display_name = "AWS Neptune Cluster (graph)"
provider     = "aws"

[mappings.storage]
service        = "AmazonNeptune"
product_family = "Database Storage"
attribute_filters = [
  { key = "volumeType", const = "General Purpose" },
]

[mappings.io]
service        = "AmazonNeptune"
product_family = "System Operation"
attribute_filters = []

[[dimensions]]
id       = "storage"
label    = "Graph storage"
unit     = "GB-month"
quantity = "default(monthly_storage_gb, 0)"
rate     = 'price("storage")'

[[dimensions]]
id       = "io_requests"
label    = "I/O requests"
unit     = "1M requests"
quantity = "default(monthly_io_requests, 0) / 1000000"
rate     = 'price("io")'

[fixture]
attributes = { monthly_io_requests = 100_000, monthly_storage_gb = 10 }
expected_monthly_cost = 1.0
tolerance = 0.05

