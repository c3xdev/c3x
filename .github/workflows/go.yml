name: Go

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go 1.x
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3

      - name: Check Terraform format
        run: make tf_fmt_check

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: latest
          args: --timeout 10m

      - name: Install Terragrunt v0.31.8
        run: |
          sudo wget -q -O /usr/bin/terragrunt "https://github.com/gruntwork-io/terragrunt/releases/download/v0.31.8/terragrunt_linux_amd64"
          sudo chmod +x /usr/bin/terragrunt
          terragrunt --version

      - name: Test (unit and shared integration)
        run: make test_shared_int
        env:
          C3X_API_KEY: "00000000000000000000000000000000"
          C3X_LOG_LEVEL: error
          C3X_TERRAFORM_CLOUD_TOKEN: ${{ secrets.TERRAFORM_CLOUD_TOKEN }}

      - name: Test (golden file pricing tests)
        run: make test_golden
        continue-on-error: true
        env:
          C3X_API_KEY: "00000000000000000000000000000000"
          C3X_LOG_LEVEL: error

      - name: Parser benchmarks
        continue-on-error: true
        run: make parser_benchmarks

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v7
        with:
          name: benchmarks
          path: |
            mem.out
            cpu.out
            trace.out

      - name: Test example works ok from CLI
        run: |
          make run --silent ARGS="breakdown --path examples/terraform --usage-file=examples/terraform/c3x-usage.yml --format json" > c3x-output.json
          [ -s c3x-output.json ] || (echo "file is empty" && exit 1)
          jq '.' c3x-output.json
        env:
          C3X_API_KEY: "00000000000000000000000000000000"
          C3X_LOG_LEVEL: info

      - name: Test example works ok from config file
        run: |
          make run --silent ARGS="breakdown --config-file=c3x-example.yml"
          [ -s c3x-output.json ] || (echo "file is empty" && exit 1)
          jq '.' c3x-output.json
        env:
          C3X_API_KEY: "00000000000000000000000000000000"
          C3X_LOG_LEVEL: info

  integration_aws:
    name: Integration tests (AWS)
    needs: build
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
      - name: Set up Go 1.x
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test (AWS)
        run: make test_aws
        env:
          C3X_API_KEY: "00000000000000000000000000000000"
          C3X_LOG_LEVEL: info

  integration_google:
    name: Integration tests (Google)
    needs: build
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
      - name: Set up Go 1.x
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test (Google)
        run: make test_google
        env:
          C3X_API_KEY: "00000000000000000000000000000000"
          C3X_LOG_LEVEL: info

  integration_azure:
    name: Integration tests (Azure)
    needs: build
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
      - name: Set up Go 1.x
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test (Azure)
        run: make test_azure
        if: env.ARM_SUBSCRIPTION_ID != ''
        env:
          C3X_API_KEY: "00000000000000000000000000000000"
          C3X_LOG_LEVEL: info
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
