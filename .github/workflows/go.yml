name: Go

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go 1.x
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0

      - name: Check Terraform format
        run: make tf_fmt_check

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: latest
          args: --timeout 10m

      - name: Install Terragrunt v0.31.8
        run: |
          sudo wget -q -O /usr/bin/terragrunt "https://github.com/gruntwork-io/terragrunt/releases/download/v0.31.8/terragrunt_linux_amd64"
          sudo chmod +x /usr/bin/terragrunt
          terragrunt --version

      - name: Test (unit and shared integration)
        run: make test_shared_int
        env:
          C3X_API_KEY: "00000000000000000000000000000000"
          C3X_LOG_LEVEL: error
          C3X_TERRAFORM_CLOUD_TOKEN: ${{ secrets.TERRAFORM_CLOUD_TOKEN }}

      - name: Test (golden file pricing tests)
        run: make test_golden
        continue-on-error: true
        env:
          C3X_API_KEY: "00000000000000000000000000000000"
          C3X_LOG_LEVEL: error

      - name: Parser benchmarks
        continue-on-error: true
        run: make parser_benchmarks

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v7
        with:
          name: benchmarks
          path: |
            mem.out
            cpu.out
            trace.out

      - name: Test example works ok from CLI
        run: |
          make run --silent ARGS="breakdown --path examples/terraform --usage-file=examples/terraform/c3x-usage.yml --format json" > c3x-output.json
          [ -s c3x-output.json ] || (echo "file is empty" && exit 1)
          jq '.' c3x-output.json
        env:
          C3X_API_KEY: "00000000000000000000000000000000"
          C3X_LOG_LEVEL: info

      - name: Test example works ok from config file
        run: |
          make run --silent ARGS="breakdown --config-file=c3x-example.yml"
          [ -s c3x-output.json ] || (echo "file is empty" && exit 1)
          jq '.' c3x-output.json
        env:
          C3X_API_KEY: "00000000000000000000000000000000"
          C3X_LOG_LEVEL: info

  e2e:
    name: E2E pricing API tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Test pricing API health
        run: |
          STATUS=$(curl -sf https://pricing.c3x.dev/healthz | grep -o '"ok"')
          [ "$STATUS" = '"ok"' ] || (echo "Health check failed" && exit 1)

      - name: Test EC2 m5.xlarge pricing
        run: |
          PRICE=$(curl -sf -X POST https://pricing.c3x.dev/graphql \
            -H "Content-Type: application/json" \
            -d '{"query":"{ products(filter: {vendorName: \"aws\", service: \"AmazonEC2\", region: \"us-east-1\", productFamily: \"Compute Instance\", attributeFilters: [{key: \"instanceType\", value: \"m5.xlarge\"}, {key: \"operatingSystem\", value: \"Linux\"}, {key: \"tenancy\", value: \"Shared\"}, {key: \"preInstalledSw\", value: \"NA\"}, {key: \"capacitystatus\", value: \"Used\"}]}) { prices(filter: {purchaseOption: \"on_demand\"}) { USD } } }"}' \
            | grep -o '"USD":"[^"]*"' | head -1 | cut -d'"' -f4)
          echo "m5.xlarge price: $PRICE"
          [ "$PRICE" = "0.1920000000" ] || (echo "Expected 0.1920000000, got $PRICE" && exit 1)

      - name: Test RDS db.r5.large pricing
        run: |
          PRICE=$(curl -sf -X POST https://pricing.c3x.dev/graphql \
            -H "Content-Type: application/json" \
            -d '{"query":"{ products(filter: {vendorName: \"aws\", service: \"AmazonRDS\", region: \"us-east-1\", productFamily: \"Database Instance\", attributeFilters: [{key: \"instanceType\", value: \"db.r5.large\"}, {key: \"databaseEngine\", value: \"PostgreSQL\"}, {key: \"deploymentOption\", value: \"Multi-AZ\"}]}) { prices(filter: {purchaseOption: \"on_demand\"}) { USD } } }"}' \
            | grep -o '"USD":"[^"]*"' | head -1 | cut -d'"' -f4)
          echo "db.r5.large price: $PRICE"
          [ "$PRICE" = "0.5000000000" ] || (echo "Expected 0.5000000000, got $PRICE" && exit 1)

      - name: Test Azure data presence
        run: |
          COUNT=$(curl -sf -X POST https://pricing.c3x.dev/graphql \
            -H "Content-Type: application/json" \
            -d '{"query":"{ products(filter: {vendorName: \"azure\", service: \"Virtual Machines\", region: \"eastus\"}, limit: 1) { productHash } }"}' \
            | grep -o '"productHash"' | wc -l)
          [ "$COUNT" -ge 1 ] || (echo "No Azure VM products found" && exit 1)
          echo "Azure VMs: present"

      - name: Test GCP data presence
        run: |
          COUNT=$(curl -sf -X POST https://pricing.c3x.dev/graphql \
            -H "Content-Type: application/json" \
            -d '{"query":"{ products(filter: {vendorName: \"gcp\", service: \"Compute Engine\"}, limit: 1) { productHash } }"}' \
            | grep -o '"productHash"' | wc -l)
          [ "$COUNT" -ge 1 ] || (echo "No GCP Compute products found" && exit 1)
          echo "GCP Compute: present"
