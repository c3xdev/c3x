# You can use this file to define resource usage estimates for C3X to use when calculating
# the cost of usage-based resource, such as AWS Lambda.
# `c3x breakdown --usage-file c3x-usage.yml [other flags]`
# See https://c3x.dev/usage-file/ for docs
version: 0.1
resource_usage:
  aws_lambda_function.event_handler:
    monthly_requests: 100000000
    request_duration_ms: 250  # Try changing this to 100 (milliseconds) to compare costs
    invalid_key_3: 1000
    invalid_key_2: 2000
    invalid_key_1: 3000
    dup_invalid_key: 4000
    dup_invalid_key: 5000
  aws_lambda_function.zero_cost_lambda:
    dup_invalid_key: 5000
